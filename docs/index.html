            var x = null,

            function loadLedConfig() {
                try {
                    var saved = localStorage.getItem("led_config");
                    if (saved) {
                        var parsed = JSON.parse(saved);
                        if (parsed.pixel_size) led_config.pixel_size = parsed.pixel_size;
                        if (parsed.serpentine !== undefined) led_config.serpentine = parsed.serpentine;
                    }
                } catch(e) {}
            }

            function saveLedConfig() {
                try {
                    localStorage.setItem("led_config", JSON.stringify(led_config));
                } catch(e) {}
            }

            function isPerfectSquare(n) {
                if (n < 1) return false;
                var r = Math.round(Math.sqrt(n));
                return r * r === n;
            }

            function buildLayoutPresets(n) {
                var presets = [];
                var seen = {};

                function add(cols, rows, label) {
                    var key = cols + "x" + rows;
                    if (!seen[key]) {
                        seen[key] = true;
                        presets.push({ cols: cols, rows: rows, label: cols + "x" + rows + " (" + label + ")" });
                    }
                }

                // 8 rows packing
                if (n % 8 === 0) add(n / 8, 8, "8 rows");

                // 1:1 square
                if (isPerfectSquare(n)) {
                    var s = Math.round(Math.sqrt(n));
                    add(s, s, "1:1");
                }

                // 2:1
                if (n % 2 === 0 && isPerfectSquare(n / 2)) {
                    var r = Math.round(Math.sqrt(n / 2));
                    add(r * 2, r, "2:1");
                }

                // 3:1
                if (n % 3 === 0 && isPerfectSquare(n / 3)) {
                    var r = Math.round(Math.sqrt(n / 3));
                    add(r * 3, r, "3:1");
                }

                // 4:1
                if (n % 4 === 0 && isPerfectSquare(n / 4)) {
                    var r = Math.round(Math.sqrt(n / 4));
                    add(r * 4, r, "4:1");
                }

                return presets;
            }
            eb = (s) => document.getElementById(s);
            qs = (s) => document.querySelector(s);
            sp = (i) =>
                (eb(i).type = eb(i).type === "text" ? "password" : "text");
            wl = (f) => window.addEventListener("load", f);
            var sn = 0,
                id = 0,
                ft,
                ltm = 2345;
            var hc = [],
                cn = 0;
            function l(p, fromBerry) {
                var c,
                    cc,
                    o = "";
                // clearTimeout(lt);
                // clearTimeout(ft);
                t = eb("t1");
                if (p == 1) {
                    c = eb("c1");
                    cc = c.value.trim();
                    if (cc) {
                        o = "&c1=" + encodeURIComponent(cc);
                        hc.length > 19 && hc.pop();
                        hc.unshift(cc);
                        cn = 0;
                    }
                    c.value = "";
                    t.scrollTop = 1e8;
                    sn = t.scrollTop;
                    if (cc) {
                        readline = cc;
                    }
                }
                if (t.scrollTop >= sn) {
                    var d, t1;
                    if (cc) {
                        d = cc;
                        var d1 = d.length > 1 ? d : null;
                        if (d1) {
                            t1 = document.createElement("div");
                            t1.classList.add("br1");
                            t1.innerText = d1;
                            t.appendChild(t1);
                        }
                    }
                    if (fromBerry) {
                        d = fromBerry;
                        d1 = d.length > 1 ? d : "";
                        if (d1) {
                            t1 = document.createElement("div");
                            t1.classList.add("br2");
                            t1.innerText = d1;
                            t.appendChild(t1);
                        }
                    }
                    t.scrollTop = 1e8;
                    sn = t.scrollTop;
                    // clearTimeout(ft);
                    // lt = setTimeout(l, ltm);

                    // ft = setTimeout(l, 2e4);
                } else {
                    // lt = setTimeout(l, ltm);
                }
                c1.focus();
                return false;
            }
            wl(l);
            var pc = 0;
            function h() {
                eb("c1").addEventListener("keydown", function (e) {
                    var b = eb("c1"),
                        c = e.keyCode;
                    if (
                        (38 == c || 40 == c) &&
                        0 == this.selectionStart &&
                        0 == this.selectionEnd
                    ) {
                        b.autocomplete = "off";
                        e.preventDefault();
                        38 == c
                            ? (++cn > hc.length && (cn = hc.length),
                              (b.value = hc[cn - 1] || ""))
                            : 40 == c
                              ? (0 > --cn && (cn = 0),
                                (b.value = hc[cn - 1] || ""))
                              : 0;
                        this.selectionStart = this.selectionEnd = 0;
                    }
                    if (c == 13 && pc == 13) {
                        e.preventDefault();
                        l(1);
                    }
                    if (c == 9) {
                        e.preventDefault();
                        var start = this.selectionStart;
                        var end = this.selectionEnd;
                        this.value =
                            this.value.substring(0, start) +
                            "  " +
                            this.value.substring(end);
                        this.selectionStart = this.selectionEnd = start + 1;
                    }
                    pc = c;
                });
            }
            wl(h);
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            function initLedConfig() {
                loadLedConfig();

                var pxSlider = eb("pixel_size");
                var pxVal = eb("pixel_size_val");
                var mwSlider = eb("matrix_w");
                var mwVal = eb("matrix_w_val");
                var serpCheck = eb("led_serpentine");
                var presetSel = eb("led_preset");

                pxSlider.value = led_config.pixel_size;
                pxVal.textContent = led_config.pixel_size;
                mwSlider.value = led_strip.w || 32;
                mwVal.textContent = mwSlider.value;
                serpCheck.checked = led_config.serpentine;

                pxSlider.addEventListener("input", function() {
                    led_config.pixel_size = parseInt(this.value);
                    pxVal.textContent = this.value;
                    saveLedConfig();
                });
                mwSlider.addEventListener("input", function() {
                    led_strip.w = parseInt(this.value);
                    mwVal.textContent = this.value;
                    presetSel.value = "";
                });
                presetSel.addEventListener("change", function() {
                    if (this.value !== "") {
                        var p = JSON.parse(this.value);
                        led_strip.w = p.cols;
                        mwSlider.value = p.cols;
                        mwVal.textContent = p.cols;
                    }
                });
                serpCheck.addEventListener("change", function() {
                    led_config.serpentine = this.checked;
                    saveLedConfig();
                });
            }

            function jd() {
                var t = 0,
                    i = document.querySelectorAll(
                        "input,button,textarea,select",
                    );
                while (i.length >= t) {
                    if (i[t]) {
                        i[t]["name"] =
                            i[t].hasAttribute("id") &&
                            !i[t].hasAttribute("name")
                                ? i[t]["id"]
                                : i[t]["name"];
                    }
                    t++;
                }
                eb("t1").addEventListener("dragover", preventDefaults);
                eb("t1").addEventListener("dragenter", preventDefaults);
                eb("t1").addEventListener("dragleave", preventDefaults);
                eb("t1").addEventListener("drop", upl);

                led_canvas = eb("canvas");
                led_canvas_ctx = led_canvas.getContext("2d");

                initLedConfig();
            }
            function sf(s) {
                var t = 0,
                    i = document.querySelectorAll(".hf");
                while (i.length >= t) {
                    if (i[t]) {
                        i[t].style.display = s ? "block" : "none";
                    }
                    t++;
                }
            }
            wl(jd);
            function su(t) {
                eb("f3").style.display = "none";
                eb("f2").style.display = "block";
                t.form.submit();
            }
            function upl(ev) {
                console.log("File(s) dropped");
                // Prevent default behavior (Prevent file from being opened)
                ev.preventDefault();

                if (ev.dataTransfer.items) {
                    // Use DataTransferItemList interface to access the file(s)
                    [...ev.dataTransfer.items].forEach((item, i) => {
                        // If dropped items aren't files, reject them
                        if (item.kind === "file") {
                            const file = item.getAsFile();
                            console.log(`… file[${i}].name = ${file.name}`);
                            if (file) {
                                let reader = new FileReader();
                                reader.onload = (e) => {
                                var bin_data = new Uint8Array(e.target.result);
                                FS.writeFile(file.name, bin_data);
                                };
                                reader.readAsArrayBuffer(file);
                            }
                        }
                    });
                } else {
                    // Use DataTransfer interface to access the file(s)
                    [...ev.dataTransfer.files].forEach((file, i) => {
                        console.log(`… file[${i}].name = ${file.name}`);
                        if (file) {
                            let reader = new FileReader();
                            reader.onload = (e) => {
                            FS.writeFile(file.name, e.target.result);
                            };
                            reader.readAsText(file);
                        }
                    });
                }
            }

            function drawLED(msg){
                eb("slider_section").style.visibility = "unset"
                let leds_left = msg.length/6

                // populate layout presets from pixel count
                var presetSel = eb("led_preset");
                var presets = buildLayoutPresets(leds_left);
                var prevVal = presetSel.value;
                presetSel.innerHTML = '<option value="">-</option>';
                for (var i = 0; i < presets.length; i++) {
                    var opt = document.createElement("option");
                    opt.value = JSON.stringify({cols: presets[i].cols, rows: presets[i].rows});
                    opt.textContent = presets[i].label;
                    presetSel.appendChild(opt);
                }
                // auto-select 8-row preset if columns not yet set
                if (led_strip.w === 0 && presets.length > 0) {
                    var best = presets[0];
                    for (var i = 0; i < presets.length; i++) {
                        if (presets[i].rows === 8) { best = presets[i]; break; }
                    }
                    led_strip.w = best.cols;
                    presetSel.value = JSON.stringify({cols: best.cols, rows: best.rows});
                    eb("matrix_w").value = best.cols;
                } else {
                    presetSel.value = prevVal;
                }

                // columns slider goes up to pixel count (single row)
                eb("matrix_w").max = leds_left;

                var columns = 32;
                if(led_strip.w != 0){
                    columns = led_strip.w;
                }
                var px = led_config.pixel_size;
                var gap = 2;
                var step = px + gap;
                led_canvas.width = columns * step;
                var rows = Math.ceil(msg.length/columns/6);
                eb("matrix_w_val").textContent = columns;
                var left2right = true;
                rows *= 6; // 6 chars per pixel
                led_canvas.height = rows * step / 6;
                const width = led_canvas.width - step;
                for(let row = 0; row < rows; row += 1){
                    if (led_config.serpentine) {
                        left2right = (row % 2 === 0);
                    }
                    for (let i = 0; i < columns; i += 1) {
                        if(leds_left == 0){
                            return;
                        }
                        led_canvas_ctx.fillStyle = `#${msg.substring((i+(row*columns)) * 6,((i+(row*columns))*6)+6)}`;
                        if(left2right){
                            led_canvas_ctx.fillRect((i * step) + 1 , (row * step) + 1, px, px);
                        } else {
                            led_canvas_ctx.fillRect((width - (i * step) ) + 1 , (row * step) + 1, px, px);
                        }
                        leds_left -= 1;
                    }
                }
                // return;

            }

            function writeOutputText(text){
                console.log("from Berry:", text);
                if (text) {
                    if (text == "> " || text == ">> ") {
                        l(null, readbuffer);
                        readbuffer = "";
                    } else {
                        readbuffer += text;
                    }
                }
            }

            async function waitLineText() {
                const waitms = (delay) =>
                    new Promise((resolve) => setTimeout(resolve, delay));
                while (!readline) await waitms(1);
                var prompt = readline;
                prompt += "\n"; //to investigate, just had to add some random char here
                readline = null;
                console.log("okay:", prompt);
                return prompt;
            }

            function parseLedConfig(jsonString){
                var j = JSON.parse(jsonString.replace("\\",""));
                if("w" in j){
                    led_strip.w = j.w;
                }
                if("h" in j){
                    led_strip.h = j.h;
                }
            }

            function writeLedBuffer(msg){
                if(msg.charAt(0) == '{'){
                    parseLedConfig(msg);
                } else {
                    drawLED(msg);
                }
            }
